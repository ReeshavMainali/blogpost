{% extends "base.html" %}
{% block title %}Log In{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-8">
  <div class="card p-8">
    <h1 class="text-2xl font-semibold mb-1" style="color: var(--color-text-main);">Welcome back</h1>
    <p class="text-sm mb-6" style="color: var(--color-text-muted);">Sign in to your account to continue.</p>

    <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">
      <div>
        <label for="email" class="label">Email</label>
        <input type="email" name="email" id="email" class="input" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div>
        <label for="password" class="label">Password</label>
        <input type="password" name="password" id="password" class="input" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <div class="flex items-center gap-2">
        <input type="checkbox" name="remember" id="remember" class="rounded" />
        <label for="remember" class="text-sm" style="color: var(--color-text-muted);">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary w-full justify-center py-2.5">Sign In</button>
    </form>

    <p class="text-center text-sm mt-6" style="color: var(--color-text-muted);">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" class="font-medium" style="color: var(--color-primary);">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
